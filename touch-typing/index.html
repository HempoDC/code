<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch Typing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Touch Typing</h1>
            <div class="stats-panel">
                <div class="stat-box">
                    <span class="stat-label">WPM</span>
                    <span class="stat-value" id="wpm">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Accuracy</span>
                    <span class="stat-value" id="accuracy">100%</span>
                </div>
                <div class="stat-box lesson-box">
                    <span class="stat-label">Lesson</span>
                    <select id="lesson-select">
                        <!-- Options generated by JS -->
                    </select>
                </div>
            </div>
        </header>

        <main>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="typing-container">
                <div class="text-display" id="text-display">
                    <!-- Text will be injected here -->
                </div>
                <div class="instruction">
                    <span id="instruction-text">Start typing to begin.</span>
                </div>
            </div>

            <div class="hands-container" id="hands">
                <div class="hand left-hand">
                    <div class="finger pinky" id="left-pinky"></div>
                    <div class="finger ring" id="left-ring"></div>
                    <div class="finger middle" id="left-middle"></div>
                    <div class="finger index" id="left-index"></div>
                    <div class="finger thumb" id="left-thumb"></div>
                </div>
                <div class="hand right-hand">
                    <div class="finger thumb" id="right-thumb"></div>
                    <div class="finger index" id="right-index"></div>
                    <div class="finger middle" id="right-middle"></div>
                    <div class="finger ring" id="right-ring"></div>
                    <div class="finger pinky" id="right-pinky"></div>
                </div>
            </div>

            <div class="keyboard-container">
                <div class="keyboard" id="keyboard">
                    <!-- Keyboard will be generated here -->
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
